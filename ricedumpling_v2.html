<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple-50: #EEEDFE;
    --purple-100: #CECBF6;
    --purple-400: #7F77DD;
    --purple-600: #534AB7;
    --purple-800: #3C3489;
    --teal-50: #E1F5EE;
    --teal-800: #085041;
    --amber-50: #FAEEDA;
    --amber-400: #BA7517;
    --amber-800: #633806;
    --gray-50: #F1EFE8;
    --gray-100: #D3D1C7;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-800: #444441;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
      "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: #E8E4DC;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px 60px;
  }

  .phone-frame {
    width: 390px;
    min-height: 780px;
    background: #fff;
    border-radius: 48px;
    border: 10px solid #1a1a1a;
    box-shadow: 0 0 0 2px #444, 0 32px 64px rgba(0,0,0,.28), inset 0 0 0 2px #333;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .phone-notch {
    width: 120px;
    height: 30px;
    background: #1a1a1a;
    border-radius: 0 0 20px 20px;
    margin: 0 auto;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .phone-screen {
    flex: 1;
    overflow-y: auto;
    padding: 0 0 32px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .phone-screen::-webkit-scrollbar { display: none; }

  /* ── LANG SELECT ── */
  .lang-view {
    text-align: center;
    padding: 48px 24px 32px;
    background: linear-gradient(160deg, #EEEDFE 0%, #fff 60%);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .lang-emoji { font-size: 52px; display: block; margin-bottom: 16px; }
  .lang-title { font-size: 22px; font-weight: 800; color: #111; margin-bottom: 8px; }
  .lang-sub { font-size: 13px; color: var(--gray-600); margin-bottom: 36px; line-height: 1.6; }
  .lang-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .lang-btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius-md);
    border: 1.5px solid #E8E6E0;
    background: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all .18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .lang-btn:hover { border-color: var(--purple-400); background: var(--purple-50); color: var(--purple-800); }
  .lang-btn.active { border-color: var(--purple-400); background: var(--purple-400); color: #fff; }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 28px 24px 24px;
    background: linear-gradient(160deg, #EEEDFE 0%, #fff 60%);
  }
  .hero-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    background: var(--purple-50);
    color: var(--purple-800);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
    border: 1px solid var(--purple-100);
  }
  .hero-img { width: 100%; border-radius: var(--radius-md); margin-bottom: 14px; display: block; }
  .hero h1 { font-size: 24px; font-weight: 800; line-height: 1.25; color: #111; margin-bottom: 8px; }
  .hero p { font-size: 13px; color: var(--gray-600); line-height: 1.7; margin-bottom: 24px; }
  .start-btn {
    display: inline-block;
    width: 100%;
    padding: 15px;
    background: var(--purple-400);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border-radius: var(--radius-md);
    cursor: pointer;
    border: none;
    transition: background .2s, transform .1s;
  }
  .start-btn:hover { background: var(--purple-600); }
  .start-btn:active { transform: scale(.97); }

  /* ── QUIZ ── */
  .quiz-wrap { padding: 20px 20px 0; }
  .progress-wrap { margin-bottom: 20px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--gray-400);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .progress-track { height: 5px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: var(--purple-400);
    border-radius: 3px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  .q-header { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
  .q-num {
    font-size: 11px; font-weight: 700;
    background: var(--purple-50); color: var(--purple-800);
    padding: 3px 10px; border-radius: 20px; border: 1px solid var(--purple-100);
  }
  .q-key-badge {
    font-size: 10px; font-weight: 600;
    background: var(--amber-50); color: var(--amber-800);
    padding: 3px 9px; border-radius: 20px; border: 1px solid #FAC775;
  }
  .q-img { width: 100%; border-radius: var(--radius-md); margin-bottom: 12px; display: block; }
  .q-text { font-size: 15px; font-weight: 700; line-height: 1.5; color: #111; margin-bottom: 14px; }

  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 13px 14px;
    border: 1.5px solid #E8E6E0; border-radius: var(--radius-md);
    background: #fff; cursor: pointer; text-align: left;
    transition: border-color .15s, background .15s; width: 100%;
  }
  .opt:hover { border-color: var(--purple-400); background: var(--purple-50); }
  .opt.selected { border-color: var(--purple-400); background: var(--purple-50); }
  .opt-label {
    font-size: 12px; font-weight: 800; color: var(--purple-800);
    background: var(--purple-100); border-radius: 6px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .opt.selected .opt-label { background: var(--purple-400); color: #fff; }
  .opt-text { font-size: 13px; line-height: 1.6; color: #333; padding-top: 2px; }

  .nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px; padding-bottom: 8px;
  }
  .nav-btn {
    padding: 10px 18px; border-radius: var(--radius-sm);
    border: 1.5px solid #E8E6E0; background: #fff;
    font-size: 13px; font-weight: 600; cursor: pointer; color: #444;
    transition: background .15s;
  }
  .nav-btn:hover { background: var(--gray-50); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
  .nav-btn.primary { background: var(--purple-400); color: #fff; border-color: var(--purple-400); }
  .nav-btn.primary:hover { background: var(--purple-600); border-color: var(--purple-600); }
  .nav-btn.primary:disabled { opacity: .35; }
  .nav-counter { font-size: 12px; color: var(--gray-400); font-weight: 600; }

  /* ── RESULT ── */
  .result-wrap { padding: 20px 20px 0; }
  .result-hero {
    text-align: center; padding: 12px 0 20px;
    border-bottom: 1px solid #F0EDE8; margin-bottom: 20px;
  }
  .result-img { width: 100%; border-radius: var(--radius-md); margin-bottom: 12px; display: block; }
  .result-type {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 8px; letter-spacing: .04em;
  }
  .result-name { font-size: 24px; font-weight: 800; color: #111; margin-bottom: 5px; }
  .result-tagline { font-size: 13px; color: var(--gray-600); line-height: 1.6; }

  .score-row { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; }
  .score-pill { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
  .score-a { background: #E6F1FB; color: #0C447C; }
  .score-b { background: var(--teal-50); color: var(--teal-800); }
  .score-c { background: var(--amber-50); color: var(--amber-800); }

  .result-tag { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; }
  .tag-ssr { background: #FFF3CD; color: #856404; border: 1px solid #FFDA6A; }
  .tag-chaos { background: #FFE5E5; color: #8B0000; border: 1px solid #FFB3B3; }
  .tag-normal { background: var(--purple-50); color: var(--purple-800); border: 1px solid var(--purple-100); }

  .traits { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  .trait {
    font-size: 11px; font-weight: 600; padding: 4px 11px; border-radius: 20px;
    background: var(--gray-50); color: var(--gray-800); border: 1px solid var(--gray-100);
  }
  .result-desc {
    font-size: 13px; line-height: 1.8; color: #444;
    background: var(--gray-50); border-radius: var(--radius-sm);
    padding: 14px; margin-bottom: 20px; border-left: 3px solid var(--purple-400);
  }
  .result-actions { display: flex; flex-direction: column; gap: 9px; }
  .share-btn {
    width: 100%; padding: 14px; background: var(--purple-400); color: #fff;
    font-size: 14px; font-weight: 700; border: none; border-radius: var(--radius-md);
    cursor: pointer; transition: background .2s;
  }
  .share-btn:hover { background: var(--purple-600); }
  .retry-btn {
    width: 100%; padding: 11px; background: #fff; color: var(--gray-600);
    font-size: 13px; font-weight: 600; border: 1.5px solid #E8E6E0;
    border-radius: var(--radius-md); cursor: pointer; transition: background .15s;
  }
  .retry-btn:hover { background: var(--gray-50); }

  .phone-footer { text-align: center; font-size: 11px; color: var(--gray-400); padding: 16px 0 8px; border-top: 1px solid #F0EDE8; margin: 20px 0 0; }

  .home-bar { height: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .home-bar-pill { width: 120px; height: 5px; background: #1a1a1a; border-radius: 3px; opacity: .15; }

  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #222; color: #fff; font-size: 13px; font-weight: 500;
    padding: 10px 20px; border-radius: var(--radius-md);
    opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .hidden { display: none !important; }

  @media (max-width: 480px) {
    body { background: #FAF9F6; padding: 0; align-items: stretch; }
    .phone-frame {
      width: 100%; min-height: 100vh; border-radius: 0;
      border: none; box-shadow: none; overflow: visible;
    }
    .phone-notch { display: none; }
    .home-bar { display: none; }
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">

    <!-- 語言選擇 -->
    <div id="lang-view">
      <div class="lang-view">
        <span class="lang-emoji">🎋</span>
        <div class="lang-title">粽說紛紜</div>

        <span class="nav-counter" id="nav-counter">1 / 6</span>
        <button class="nav-btn primary" id="next-btn" onclick="goNext()" disabled><span id="next-label">下一題</span> →</button>
      </div>
      <div class="phone-footer">粽說紛紜 · KrenzArtwork 端午節特別企劃</div>
    </div>

    <!-- RESULT -->
    <div class="result-wrap hidden" id="result-view">
      <div class="result-hero" id="result-hero"></div>
      <div class="score-row" id="score-row"></div>
      <div class="traits" id="result-traits"></div>
      <div class="result-desc" id="result-desc"></div>
      <div class="result-actions">
        <button class="share-btn" id="share-btn" onclick="shareResult()">分享我的結果</button>
        <button class="retry-btn" onclick="restart()" id="retry-btn">↺ 再測一次</button>
      </div>
      <div class="phone-footer">粽說紛紜 · KrenzArtwork 端午節特別企劃</div>
    </div>

  </div>
  <div class="home-bar"><div class="home-bar-pill"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>

  {

// ── 語言設定 ──
function setLang(l) {
  lang = l;
  document.getElementById('lang-view').classList.add('hidden');
  document.getElementById('hero-view').classList.remove('hidden');
  if (lang === 'CN') {
    document.getElementById('hero-badge').textContent = '🎋 端午节创作灵魂测验';
    document.getElementById('hero-title').textContent = '粽说纷纭';
    document.getElementById('hero-desc').textContent = '你的画画习惯，适合哪一种粽子？\n6道题，测出你的创作灵魂。';
    document.getElementById('hero-btn').textContent = '开始测验';
  }
}

function getQs() { return lang === 'CN' ? QsCN : QsTW; }

// ── 判定邏輯 ──
function getResult() {
  const Qs = getQs();
  const cCount = answers.filter(a => a === 'C').length;
  const allSame = answers.every(a => a === answers[0]);

  // 第一優先：混沌機制
  if (cCount >= 4 || allSame) {
    if (lang === 'TW') {
      const pool = ['tw_zhongbu', 'tw_cinavu', 'tw_3d'];
      return pool[Math.floor(Math.random() * pool.length)];
    } else {
      const pool = ['cn_luosifen', 'cn_latiao', 'cn_durian'];
      return pool[Math.floor(Math.random() * pool.length)];
    }
  }

  // 第二優先：SSR 10%
  if (Math.random() < 0.1) return 'ssr';

  // 第三優先：正常計分
  const aCount = answers.filter(a => a === 'A').length;
  const bCount = answers.filter(a => a === 'B').length;
  const q4 = answers[3];

  if (aCount > bCount) { return q4 === 'A' ? 'classic' : 'luxe'; }
  if (bCount > aCount) { return q4 === 'C' ? 'lye' : 'sweet'; }
  // 平手用 Q6 決勝
  const q6 = answers[5];
  if (q6 === 'C') return 'crystal';
  if (q6 === 'B') return 'sweet';
  return 'classic';
}

// ── UI 控制 ──
function startQuiz() {
  document.getElementById('hero-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  render(); scrollTop();
}

function render() {
  const Qs = getQs();
  const q = Qs[cur];
  const pct = Math.round((cur + 1) / 6 * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = lang === 'CN' ? `第 ${cur+1} 题，共 6 题` : `第 ${cur+1} 題，共 6 題`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('nav-counter').textContent = `${cur+1} / 6`;

  const pb = document.getElementById('prev-btn');
  pb.disabled = false;
  document.getElementById('prev-label').textContent = cur === 0 ? (lang === 'CN' ? '回封面' : '回封面') : (lang === 'CN' ? '上一题' : '上一題');

  const nb = document.getElementById('next-btn');
  nb.disabled = answers[cur] === null;
  document.getElementById('next-label').textContent = cur === 5 ? (lang === 'CN' ? '看结果' : '看結果') : (lang === 'CN' ? '下一题' : '下一題');

  document.getElementById('q-area').innerHTML = `
    <div class="q-header">
      <span class="q-num">Q${cur+1}</span>
      ${q.key ? `<span class="q-key-badge">${lang==='CN'?'关键题':'關鍵題'}</span>` : ''}
    </div>
    ${q.img ? `<img class="q-img" src="${q.img}" alt="Q${cur+1}">` : ''}
    <div class="q-text">${q.q}</div>
    <div class="options">
      ${q.opts.map(o => `
        <button class="opt${answers[cur]===o.l?' selected':''}" onclick="pick('${o.l}')">
          <span class="opt-label">${o.l}</span>
          <span class="opt-text">${o.t}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function pick(v) {
  answers[cur] = v;
  document.querySelectorAll('.opt').forEach(el => {
    el.classList.toggle('selected', el.querySelector('.opt-label').textContent === v);
  });
  document.getElementById('next-btn').disabled = false;
  setTimeout(() => {
    if (cur === 5) { showResult(); } else { cur++; render(); scrollTop(); }
  }, 400);
}

function goPrev() {
  if (cur === 0) {
    document.getElementById('quiz-view').classList.add('hidden');
    document.getElementById('hero-view').classList.remove('hidden');
    cur = 0; answers = Array(6).fill(null);
    scrollTop();
  } else { cur--; render(); scrollTop(); }
}

function goNext() {
  if (cur === 5) { showResult(); } else { cur++; render(); scrollTop(); }
}

function scrollTop() {
  const screen = document.querySelector('.phone-screen');
  if (screen) screen.scrollTo({ top: 0, behavior: 'smooth' });
  else window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResult() {
  document.getElementById('quiz-view').classList.add('hidden');
  document.getElementById('result-view').classList.remove('hidden');

  const key = getResult();
  const r = Results[key];
  const d = lang === 'CN' ? r.cn : r.tw;
  const aCount = answers.filter(a => a === 'A').length;
  const bCount = answers.filter(a => a === 'B').length;
  const cCount = answers.filter(a => a === 'C').length;

  const tagMap = {
    normal: lang === 'CN' ? '正常人格粽 🌿' : '正常人格粽 🌿',
    ssr: '✨ SSR 神級爆率',
    chaos: lang === 'CN' ? '🎲 混沌机制触发' : '🎲 混沌機制觸發'
  };
  const tagClass = { normal:'tag-normal', ssr:'tag-ssr', chaos:'tag-chaos' };

  document.getElementById('result-hero').innerHTML = `
    ${r.img ? `<img class="result-img" src="${r.img}" alt="${d.name}">` : ''}
    <span class="result-tag ${tagClass[r.tag]}">${tagMap[r.tag]}</span>
    <span class="result-type" style="${r.labelStyle}">${d.label}</span>
    <div class="result-name">${d.name}</div>
    <div class="result-tagline">${d.tagline}</div>
  `;
  document.getElementById('score-row').innerHTML = '';
  document.getElementById('result-traits').innerHTML = d.traits.map(t => `<span class="trait">${t}</span>`).join('');
  document.getElementById('result-desc').textContent = d.desc;

  const shareBtn = document.getElementById('share-btn');
  shareBtn.dataset.name = d.name;
  shareBtn.dataset.tagline = d.tagline;
  shareBtn.textContent = lang === 'CN' ? '分享我的结果' : '分享我的結果';
  document.getElementById('retry-btn').textContent = lang === 'CN' ? '↺ 再测一次' : '↺ 再測一次';

  scrollTop();
  submitToNotion(key, d.name, aCount, bCount, cCount);
}

function submitToNotion(result_key, result_name, score_a, score_b, score_c) {
  fetch('https://zongzi-notion-api.suian0701.workers.dev/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ result_key, result_name, score_a, score_b, score_c })
  }).catch(() => {});
}

function shareResult() {
  const btn = document.getElementById('share-btn');
  const text = lang === 'CN'
    ? `🎋【粽说纷纭】KrenzArtwork端午节创作者灵魂测验\n\n我的结果是：${btn.dataset.name}\n「${btn.dataset.tagline}」\n\n快来测测你是哪种粽子！\n#端午节 #粽说纷纭 #KrenzArtwork`
    : `🎋【粽說紛紜】KrenzArtwork端午節創作者靈魂測驗\n\n我的結果是：${btn.dataset.name}\n「${btn.dataset.tagline}」\n\n快來測測你是哪種粽子！\n#端午節 #粽說紛紜 #KrenzArtwork`;
  if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text)
      .then(() => showToast(lang === 'CN' ? '已复制到剪贴板！' : '已複製到剪貼簿！'))
      .catch(() => showToast(lang === 'CN' ? '请手动复制' : '請手動複製'));
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function restart() {
  cur = 0; answers = Array(6).fill(null);
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('lang-view').classList.remove('hidden');
  scrollTop();
}
</script>
