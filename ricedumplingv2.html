<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粽說紛紜｜你的畫畫習慣適合什麼粽子？</title>
<meta name="description" content="5題測驗，揭開你的創作靈魂！你是經典肉粽、甜心豆沙粽，還是晶瑩水晶粽？">
<meta property="og:title" content="粽說紛紜｜你的畫畫習慣適合什麼粽子？">
<meta property="og:description" content="5題測驗，揭開你的創作靈魂！">
<meta property="og:type" content="website">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple-50: #EEEDFE;
    --purple-100: #CECBF6;
    --purple-400: #7F77DD;
    --purple-600: #534AB7;
    --purple-800: #3C3489;
    --teal-50: #E1F5EE;
    --teal-400: #1D9E75;
    --teal-800: #085041;
    --coral-50: #FAECE7;
    --coral-400: #D85A30;
    --coral-800: #712B13;
    --amber-50: #FAEEDA;
    --amber-400: #BA7517;
    --amber-800: #633806;
    --green-50: #EAF3DE;
    --green-400: #639922;
    --green-800: #27500A;
    --gray-50: #F1EFE8;
    --gray-100: #D3D1C7;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-800: #444441;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
      "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: #FAF9F6;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }

  /* ── HERO ── */
  .hero {
    width: 100%;
    max-width: 600px;
    text-align: center;
    padding: 60px 0 40px;
  }
  .hero-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .06em;
    background: var(--purple-50);
    color: var(--purple-800);
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
    border: 1px solid var(--purple-100);
  }
  .hero-emoji { font-size: 56px; display: block; margin-bottom: 16px; }
  .hero h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    line-height: 1.3;
    color: #111;
    margin-bottom: 12px;
  }
  .hero p {
    font-size: 15px;
    color: var(--gray-600);
    line-height: 1.7;
    max-width: 400px;
    margin: 0 auto 32px;
  }
  .start-btn {
    display: inline-block;
    padding: 14px 36px;
    background: var(--purple-400);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    border-radius: var(--radius-md);
    cursor: pointer;
    border: none;
    transition: background .2s, transform .1s;
    letter-spacing: .02em;
  }
  .start-btn:hover { background: var(--purple-600); }
  .start-btn:active { transform: scale(.98); }

  /* ── QUIZ CARD ── */
  .card {
    width: 100%;
    max-width: 600px;
    background: #fff;
    border: 1px solid #E8E6E0;
    border-radius: var(--radius-lg);
    padding: 32px 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }

  /* progress */
  .progress-wrap { margin-bottom: 28px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--gray-400);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .progress-track {
    height: 4px;
    background: var(--gray-100);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--purple-400);
    border-radius: 2px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  /* question */
  .q-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .q-num {
    font-size: 12px;
    font-weight: 600;
    background: var(--purple-50);
    color: var(--purple-800);
    padding: 3px 12px;
    border-radius: 20px;
    border: 1px solid var(--purple-100);
  }
  .q-key-badge {
    font-size: 11px;
    font-weight: 500;
    background: var(--amber-50);
    color: var(--amber-800);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid #FAC775;
  }
  .q-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.55;
    color: #111;
    margin-bottom: 22px;
  }

  /* options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    border: 1.5px solid #E8E6E0;
    border-radius: var(--radius-md);
    background: #fff;
    cursor: pointer;
    text-align: left;
    transition: border-color .18s, background .18s;
    width: 100%;
  }
  .opt:hover { border-color: var(--purple-400); background: var(--purple-50); }
  .opt.selected {
    border-color: var(--purple-400);
    background: var(--purple-50);
  }
  .opt-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--purple-800);
    background: var(--purple-100);
    border-radius: 6px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .opt.selected .opt-label {
    background: var(--purple-400);
    color: #fff;
  }
  .opt-text { font-size: 14px; line-height: 1.65; color: #333; padding-top: 2px; }

  /* nav */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
  }
  .nav-btn {
    padding: 10px 22px;
    border-radius: var(--radius-sm);
    border: 1.5px solid #E8E6E0;
    background: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: #444;
    transition: background .18s, border-color .18s;
  }
  .nav-btn:hover { background: var(--gray-50); border-color: var(--gray-100); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
  .nav-btn.primary {
    background: var(--purple-400);
    color: #fff;
    border-color: var(--purple-400);
    font-weight: 600;
  }
  .nav-btn.primary:hover { background: var(--purple-600); border-color: var(--purple-600); }
  .nav-btn.primary:disabled { opacity: .35; }
  .nav-counter { font-size: 13px; color: var(--gray-400); font-weight: 500; }

  /* ── RESULT ── */
  .result-hero {
    text-align: center;
    padding: 8px 0 24px;
    border-bottom: 1px solid #F0EDE8;
    margin-bottom: 24px;
  }
  .result-emoji { font-size: 52px; display: block; margin-bottom: 12px; }
  .result-type {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
    letter-spacing: .04em;
  }
  .result-name { font-size: 26px; font-weight: 700; color: #111; margin-bottom: 6px; }
  .result-tagline { font-size: 14px; color: var(--gray-600); line-height: 1.6; }

  .traits { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .trait {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--gray-50);
    color: var(--gray-800);
    border: 1px solid var(--gray-100);
  }
  .result-desc {
    font-size: 14px;
    line-height: 1.8;
    color: #444;
    background: var(--gray-50);
    border-radius: var(--radius-sm);
    padding: 16px;
    margin-bottom: 24px;
    border-left: 3px solid var(--purple-400);
  }

  .score-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .score-pill {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 20px;
  }
  .score-a { background: #E6F1FB; color: #0C447C; }
  .score-b { background: var(--teal-50); color: var(--teal-800); }
  .score-c { background: var(--amber-50); color: var(--amber-800); }

  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .share-btn {
    width: 100%;
    padding: 14px;
    background: var(--purple-400);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background .2s;
  }
  .share-btn:hover { background: var(--purple-600); }
  .retry-btn {
    width: 100%;
    padding: 12px;
    background: #fff;
    color: var(--gray-600);
    font-size: 14px;
    font-weight: 500;
    border: 1.5px solid #E8E6E0;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background .18s;
  }
  .retry-btn:hover { background: var(--gray-50); }

  /* toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #222;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: var(--radius-md);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* footer */
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--gray-400);
    text-align: center;
  }

  /* hidden */
  .hidden { display: none !important; }

  @media (max-width: 480px) {
    body { padding: 0 12px 48px; }
    .card { padding: 24px 18px; }
    .hero { padding: 40px 0 32px; }
    .q-text { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero" id="hero-view">
  <span class="hero-badge">🎋 端午節創作靈魂測驗</span>
  <span class="hero-emoji">🍃</span>
  <h1>粽說紛紜</h1>
  <p>你的畫畫習慣，適合哪一種粽子？<br>5 道題，測出你的創作靈魂。</p>
  <button class="start-btn" onclick="startQuiz()">開始測驗</button>
</section>

<!-- QUIZ -->
<div class="card hidden" id="quiz-view">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label">第 1 題，共 5 題</span>
      <span id="prog-pct">20%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:20%"></div>
    </div>
  </div>
  <div id="q-area"></div>
  <div class="nav">
    <button class="nav-btn" id="prev-btn" onclick="go(-1)" disabled>← 上一題</button>
    <span class="nav-counter" id="nav-counter">1 / 5</span>
    <button class="nav-btn primary" id="next-btn" onclick="goNext()" disabled>下一題 →</button>
  </div>
</div>

<!-- RESULT -->
<div class="card hidden" id="result-view">
  <div class="result-hero" id="result-hero"></div>
  <div class="score-row" id="score-row"></div>
  <div class="traits" id="result-traits"></div>
  <div class="result-desc" id="result-desc"></div>
  <div class="result-actions">
    <button class="share-btn" id="share-btn" onclick="shareResult()">分享我的結果</button>
    <button class="retry-btn" onclick="restart()">↺ 再測一次</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<footer>粽說紛紜 · 端午節特別企劃</footer>

<script>
const Qs = [
  {
    q: "當你要開始一項新創作時，你通常如何熱身？",
    opts: [
      { l:"A", t:"蒐集大量參考資料，整理成情緒板（Mood Board）" },
      { l:"B", t:"先隨意塗鴉，讓筆尖跟著情緒走" },
      { l:"C", t:"研究最新的技術教科書或嘗試新軟體功能" }
    ]
  },
  {
    q: "在你作品中，哪一個元素是你最絕對不退讓的？",
    opts: [
      { l:"A", t:"構圖的平衡感與透視的準確" },
      { l:"B", t:"畫面傳達出的故事性與情緒" },
      { l:"C", t:"色彩的實驗性與整體的視覺張力" }
    ]
  },
  {
    q: "如果你的創作過程是一種聲音，你覺得它聽起來像？",
    opts: [
      { l:"A", t:"齒輪咬合的精密運作聲（穩紮穩打）" },
      { l:"B", t:"鋼琴輕聲彈奏的旋律（緩慢細膩）" },
      { l:"C", t:"電音或快節奏的鼓點（爆發力強）" }
    ]
  },
  {
    q: "當你遇到「創作瓶頸」時，你的反應通常是？",
    key: true,
    opts: [
      { l:"A", t:"回頭檢視基礎，從素描或骨架重新練起" },
      { l:"B", t:"暫時放下筆，去大自然或生活中找靈感" },
      { l:"C", t:"去看國外頂尖大神的最新作品，刺激感官" }
    ]
  },
  {
    q: "你希望別人看完你的作品後，第一反應是？",
    opts: [
      { l:"A", t:"「這基本功太紮實了，專業！」" },
      { l:"B", t:"「這張圖看著心裡酸酸的（或暖暖的），很有感觸。」" },
      { l:"C", t:"「太酷了！這視覺效果是怎麼做出來的？」" }
    ]
  }
];

const Results = {
  classic: {
    emoji: "🍖", name: "經典肉粽",
    tagline: "基本功是你的秘密武器",
    label: "理性 · 紮實 · 傳統",
    labelStyle: "background:#E6F1FB;color:#0C447C;border:1px solid #B5D4F4;",
    traits: ["結構清晰","按部就班","細節控","值得信賴"],
    desc: "你的創作像一顆完美紮實的肉粽——每一層都有它存在的理由。你相信紮實的基礎才能托起一切，寧可慢工出細活，也不願打馬虎眼。欣賞你的人，都佩服你那份沉穩與專業。時間站在你這邊。"
  },
  luxe: {
    emoji: "🌟", name: "豪華八寶粽",
    tagline: "細節才是你的主場",
    label: "理性 · 細節 · 繁複",
    labelStyle: "background:#E6F1FB;color:#0C447C;border:1px solid #B5D4F4;",
    traits: ["精益求精","層次豐富","完美主義","驚喜感"],
    desc: "你不只是理性，你還愛在細節裡做文章。作品裡總藏著只有懂的人才看得出的彩蛋，就像八寶粽裡暗藏的栗子與香菇。複雜度是你的語言，豐富感是你的簽名。"
  },
  sweet: {
    emoji: "🫘", name: "甜心豆沙粽",
    tagline: "情感共鳴是你最強的創作語言",
    label: "感性 · 情緒 · 療癒",
    labelStyle: "background:#E1F5EE;color:#085041;border:1px solid #9FE1CB;",
    traits: ["感情豐沛","溫暖細膩","故事性強","治癒系"],
    desc: "你的畫會說話，而且說的是最容易觸動人心的那種話。你用情緒作畫，觀眾看完之後往往沉默幾秒才能反應——因為那張圖剛好戳到了什麼。豆沙的甜，恰到好處，不膩。"
  },
  lye: {
    emoji: "🌿", name: "清香鹼水粽",
    tagline: "留白，才是你最有力的筆觸",
    label: "感性 · 極簡 · 意境",
    labelStyle: "background:#EAF3DE;color:#27500A;border:1px solid #C0DD97;",
    traits: ["意境深遠","極簡主義","禪感十足","留白美學"],
    desc: "你懂得「少即是多」的哲學。畫面不需要塞滿，一條線、一片空白，就能讓人感受到風的方向。你的靈感來自山林與靜默，作品散發著一種沉靜的自信。"
  },
  crystal: {
    emoji: "✨", name: "晶瑩水晶粽",
    tagline: "你天生就是用來打破規則的",
    label: "創新 · 視覺 · 潮流",
    labelStyle: "background:#FAEEDA;color:#633806;border:1px solid #FAC775;",
    traits: ["前衛大膽","視覺衝擊","趨勢敏感","實驗精神"],
    desc: "你最不甘於現狀。別人走的路你往往繞道，最新的技術、最前衛的視覺語言都是你的玩具。你的作品讓人第一眼就想截圖——不管看不看得懂，先說「好酷」再說。"
  }
};

let cur = 0;
let answers = Array(5).fill(null);

function startQuiz() {
  document.getElementById('hero-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  render();
}

function count(v) { return answers.filter(a => a === v).length; }

function getResult() {
  const a = count("A"), b = count("B"), c = count("C");
  const q4 = answers[3], q5 = answers[4];
  if (c > a && c > b) return "crystal";
  if (a > b) { return q4 === "A" ? "classic" : "luxe"; }
  if (b > a) { return q4 === "C" ? "lye" : "sweet"; }
  if (q5 === "C") return "crystal";
  if (q5 === "B") return "sweet";
  return "classic";
}

function render() {
  const q = Qs[cur];
  const pct = Math.round((cur + 1) / 5 * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `第 ${cur+1} 題，共 5 題`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('nav-counter').textContent = `${cur+1} / 5`;
  document.getElementById('prev-btn').disabled = cur === 0;

  const nb = document.getElementById('next-btn');
  nb.disabled = answers[cur] === null;
  nb.textContent = cur === 4 ? '看結果 →' : '下一題 →';

  document.getElementById('q-area').innerHTML = `
    <div class="q-header">
      <span class="q-num">Q${cur+1}</span>
      ${q.key ? '<span class="q-key-badge">關鍵題</span>' : ''}
    </div>
    <div class="q-text">${q.q}</div>
    <div class="options">
      ${q.opts.map(o => `
        <button class="opt${answers[cur]===o.l?' selected':''}" onclick="pick('${o.l}')">
          <span class="opt-label">${o.l}</span>
          <span class="opt-text">${o.t}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function pick(v) {
  answers[cur] = v;
  document.querySelectorAll('.opt').forEach(el => {
    const lbl = el.querySelector('.opt-label').textContent;
    el.classList.toggle('selected', lbl === v);
  });
  document.getElementById('next-btn').disabled = false;
}

function go(dir) {
  const n = cur + dir;
  if (n >= 0 && n < 5) { cur = n; render(); }
}

function goNext() {
  if (cur === 4) { showResult(); } else { go(1); }
}

function showResult() {
  document.getElementById('quiz-view').classList.add('hidden');
  const rv = document.getElementById('result-view');
  rv.classList.remove('hidden');

  const key = getResult();
  const r = Results[key];
  const a = count("A"), b = count("B"), c = count("C");

  document.getElementById('result-hero').innerHTML = `
    <span class="result-emoji">${r.emoji}</span>
    <span class="result-type" style="${r.labelStyle}">${r.label}</span>
    <div class="result-name">${r.name}</div>
    <div class="result-tagline">${r.tagline}</div>
  `;
  document.getElementById('score-row').innerHTML = `
    <span class="score-pill score-a">理性 A × ${a}</span>
    <span class="score-pill score-b">感性 B × ${b}</span>
    <span class="score-pill score-c">創新 C × ${c}</span>
  `;
  document.getElementById('result-traits').innerHTML =
    r.traits.map(t => `<span class="trait">${t}</span>`).join('');
  document.getElementById('result-desc').textContent = r.desc;

  document.getElementById('share-btn').dataset.name = r.name;
  document.getElementById('share-btn').dataset.tagline = r.tagline;
}

function shareResult() {
  const btn = document.getElementById('share-btn');
  const name = btn.dataset.name;
  const tagline = btn.dataset.tagline;
  const text = `🎋【粽說紛紜】創作靈魂測驗\n\n我的結果是：${name}\n「${tagline}」\n\n快來測測你是哪種粽子！\n#端午節 #粽說紛紜 #創作靈魂`;

  if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      showToast('已複製到剪貼簿！');
    }).catch(() => showToast('請手動複製分享內容'));
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function restart() {
  cur = 0;
  answers = Array(5).fill(null);
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('quiz-view').classList.remove('hidden');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
