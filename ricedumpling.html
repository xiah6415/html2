<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>粽說紛紜 | 創作靈魂測驗</title>
    <style>
        :root {
            --primary: #1a4d32; 
            --accent: #f0f7f0; 
            --bg: #fdfcf8; 
            --text: #2d3748;
            --gray: #718096;
            --white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 480px; min-height: 100vh;
            background: var(--bg); position: relative;
            display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        /* 頂部進度條 */
        .progress-container {
            width: 100%; height: 6px; background: #edf2f7; position: fixed; top: 0; left: 0; z-index: 100;
        }
        .progress-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #2f855a, #48bb78); transition: var(--transition);
        }

        .screen { display: none; padding: 40px 24px; opacity: 0; flex: 1; }
        .screen.active { display: flex; flex-direction: column; animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 封面 */
        .hero-img { 
            width: 100%; height: 320px; object-fit: cover; 
            border-radius: 24px; margin-bottom: 30px;
            background-color: var(--accent); /* 圖死掉時的底色 */
        }
        h1 { font-size: 32px; color: var(--primary); margin: 0; font-weight: 900; text-align: center; }
        .subtitle { font-size: 16px; color: var(--gray); text-align: center; margin-top: 10px; margin-bottom: 40px; }

        /* 題目 */
        .q-header { margin-bottom: 30px; }
        .q-num { font-size: 13px; color: var(--primary); font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; }
        .q-text { font-size: 24px; line-height: 1.4; font-weight: 700; color: #1a202c; }

        /* 選項卡片 */
        .options-grid { display: grid; gap: 16px; }
        .option-card {
            background: var(--white); border: 2px solid #edf2f7; border-radius: 20px;
            padding: 22px; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center;
        }
        .option-card:active { border-color: var(--primary); background: var(--accent); transform: scale(0.98); }
        .option-tag { 
            min-width: 36px; height: 36px; border-radius: 12px; background: #f7fafc; 
            display: flex; align-items: center; justify-content: center; 
            margin-right: 16px; font-weight: 800; color: var(--primary);
        }

        .btn-primary {
            background: var(--primary); color: white; border: none; padding: 20px;
            border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(47, 133, 90, 0.3); margin-top: auto;
        }

        /* 結果頁 */
        #screen-result { padding: 0; background: #1a202c; position: relative; }
        #result-image { width: 100%; height: 100vh; object-fit: cover; background-color: #2D3748; }
        .save-hint {
            position: absolute; bottom: 40px; left: 0; width: 100%; text-align: center;
            color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-weight: 600;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="progress-container"><div class="progress-bar" id="progress"></div></div>

    <div id="screen-intro" class="screen active">
        <img src="https://placehold.co/600x600/1a4d32/ffffff?text=Zongzi+Quiz+Cover" class="hero-img">
        <h1>粽說紛紜</h1>
        <div class="subtitle">測測你的創作靈魂是什麼口味？</div>
        <button class="btn-primary" onclick="startQuiz()">開始測試</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="q-header">
            <div class="q-num" id="q-num-label">STEP 01</div>
            <div class="q-text" id="q-text-label">加載中...</div>
        </div>
        <div class="options-grid" id="options-container"></div>
    </div>

    <div id="screen-result" class="screen">
        <img src="" alt="Result" id="result-image" onerror="this.src='https://placehold.co/800x1400/2D3748/ffffff?text=Loading+Error'">
        <div class="save-hint">「長按圖片儲存，分享你的靈魂口味」</div>
    </div>
</div>

<script>
    const quizData = [
        { text: "當你要開始一項新創作時，你通常如何熱身？", options: [{t:"A", s:"蒐集資料，整理情緒板 (Mood Board)"},{t:"B", s:"先隨意塗鴉，讓筆尖跟著情緒走"},{t:"C", s:"研究新軟體功能或新筆刷"}] },
        { text: "在你作品中，哪一個元素是你最絕對不退讓的？", options: [{t:"A", s:"構圖的平衡感與透視的準確"},{t:"B", s:"畫面傳達出的故事性與情緒"},{t:"C", s:"色彩的實驗性與視覺張力"}] },
        { text: "如果你的創作過程是一種聲音，你覺得它聽起來像？", options: [{t:"A", s:"齒輪咬合的精密運作聲"},{t:"B", s:"鋼琴輕聲彈奏的旋律"},{t:"C", s:"電音或快節奏的鼓點"}] },
        { text: "當你遇到「創作瓶頸」時，你的反應通常是？", options: [{t:"A", s:"回頭檢視基礎，從素描或骨架重新練起"},{t:"B", s:"暫時放下筆，去大自然或生活中找靈感"},{t:"C", s:"去看國外頂尖大神的最新作品"}] },
        { text: "你希望別人看完你的作品後，第一反應是？", options: [{t:"A", s:"「這基本功太紮實了，專業！」"},{t:"B", s:"「這畫風好溫暖，很有共鳴。」"},{t:"C", s:"「太酷了！這視覺效果怎麼做的？」"}] }
    ];

    // 結果圖：先使用不同顏色的色塊示意，確保 PM 能看到「結果有在切換」
    const resultImages = {
        '肉粽': 'https://placehold.co/800x1400/1a4d32/ffffff?text=MEAT+ZONGZI',
        '八寶粽': 'https://placehold.co/800x1400/2c5282/ffffff?text=EIGHT+TREASURE',
        '豆沙粽': 'https://placehold.co/800x1400/9b2c2c/ffffff?text=BEAN+PASTE',
        '鹼水粽': 'https://placehold.co/800x1400/744210/ffffff?text=ALKALI+WATER',
        '水晶粽': 'https://placehold.co/800x1400/285e61/ffffff?text=CRYSTAL+ZONGZI'
    };

    let step = 0;
    let answers = [];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function startQuiz() {
        step = 0; answers = [];
        updateQuiz();
        showScreen('screen-quiz');
    }

    function updateQuiz() {
        const data = quizData[step];
        document.getElementById('q-num-label').innerText = `STEP 0${step + 1}`;
        document.getElementById('q-text-label').innerText = data.text;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        data.options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerHTML = `<div class="option-tag">${opt.t}</div><div>${opt.s}</div>`;
            card.onclick = () => select(opt.t);
            container.appendChild(card);
        });
        
        document.getElementById('progress').style.width = `${((step) / quizData.length) * 100}%`;
    }

    function select(tag) {
        answers.push(tag);
        if (step < quizData.length - 1) {
            step++;
            const screen = document.getElementById('screen-quiz');
            screen.style.opacity = '0';
            setTimeout(() => {
                updateQuiz();
                screen.style.opacity = '1';
            }, 300);
        } else {
            document.getElementById('progress').style.width = `100%`;
            calculate();
        }
    }

    function calculate() {
        const q4 = answers[3];
        const counts = { A: 0, B: 0, C: 0 };
        answers.forEach(a => counts[a]++);

        let res = '';
        if (counts.A >= counts.B && counts.A >= counts.C) {
            res = (q4 === 'A') ? '肉粽' : '八寶粽';
        } else if (counts.B > counts.A && counts.B >= counts.C) {
            res = (q4 === 'C') ? '鹼水粽' : '豆沙粽';
        } else {
            res = '水晶粽';
        }

        // 這裡會換上對應的分數圖
        document.getElementById('result-image').src = resultImages[res];
        setTimeout(() => showScreen('screen-result'), 600);
    }
</script>

</body>
</html>
